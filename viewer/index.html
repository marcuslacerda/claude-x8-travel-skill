<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trips</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <h1>My trips</h1>
        <p class="destination">Local index of trips planned with the x8-travel skill.</p>
      </header>

      <main id="main">
        <div class="loading">Loading trips…</div>
      </main>

      <footer style="margin-top: 4rem; color: var(--ink-muted); font-size: 0.85rem">
        Generated by
        <a href="https://github.com/marcuslacerda/claude-x8-travel-skill">claude-x8-travel-skill</a>
        · Map by
        <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> ·
        <a href="https://maplibre.org/">MapLibre GL</a>
      </footer>
    </div>

    <script type="module">
      import { formatDateRange } from "./lib/schema-types.js";

      const main = document.getElementById("main");

      async function loadTrips() {
        // Discovery sources (merged + deduped):
        //   1. ?slug=foo,bar (explicit query param — power users)
        //   2. trips/trips-index.json (manifest the skill maintains after new-trip)
        //   3. trips/ directory listing (fallback for trips created manually,
        //      works when serving via `python3 -m http.server` or caddy)
        //   4. examples/examples-index.json (checked-in showcases)
        const fromQuery = new URLSearchParams(location.search).get("slug");
        const slugs = fromQuery
          ? fromQuery.split(",").filter(Boolean)
          : [
              ...(await loadManifest("../trips/trips-index.json")),
              ...(await discoverFromListing("../trips/")),
              ...(await loadManifest("../examples/examples-index.json")),
            ];

        if (!slugs || slugs.length === 0) {
          main.innerHTML = `
            <div class="empty">
              <p>No trips found yet.</p>
              <p style="font-size:0.9rem">In Claude Code, run <code>/travel-planner new-trip &lt;slug&gt;</code> to plan one.</p>
            </div>
          `;
          return;
        }

        const trips = await Promise.all([...new Set(slugs)].map((slug) => loadTripSummary(slug)));
        const ok = trips.filter(Boolean);
        if (ok.length === 0) {
          main.innerHTML = `<div class="error">Couldn't load any trips. Make sure you're serving from the repo root via <code>python3 -m http.server</code>.</div>`;
          return;
        }

        const grid = document.createElement("div");
        grid.className = "trips-grid";
        ok.forEach((trip) => grid.appendChild(renderTripCard(trip)));
        main.innerHTML = "";
        main.appendChild(grid);
      }

      async function loadManifest(path) {
        try {
          const res = await fetch(path);
          if (!res.ok) return [];
          const data = await res.json();
          return Array.isArray(data) ? data : Array.isArray(data.slugs) ? data.slugs : [];
        } catch {
          return [];
        }
      }

      // Best-effort: parse a directory listing HTML response (Python's
      // http.server, caddy file_server, nginx autoindex). Looks for <a href>
      // entries that end with `/` — those are subdirectories. Returns [] if
      // the response isn't HTML or no slugs are found.
      async function discoverFromListing(path) {
        try {
          const res = await fetch(path, { headers: { Accept: "text/html" } });
          if (!res.ok) return [];
          const ct = res.headers.get("content-type") || "";
          if (!ct.includes("html")) return [];
          const html = await res.text();
          // href can be `slug/` (python), `./slug/` (caddy), or absolute path.
          // Capture the whole href and take the last non-empty path segment.
          const matches = [...html.matchAll(/<a[^>]+href="([^"?#]+)\/"/g)];
          return matches
            .map((m) => decodeURIComponent(m[1]).split("/").filter(Boolean).pop())
            .filter((s) => s && /^[a-z0-9][a-z0-9-]*$/.test(s));
        } catch {
          return [];
        }
      }

      async function loadTripSummary(slug) {
        for (const root of [`../trips/${slug}`, `../examples/${slug}`]) {
          try {
            const res = await fetch(`${root}/trip.json`);
            if (res.ok) {
              const trip = await res.json();
              return { slug, ...trip };
            }
          } catch {}
        }
        return null;
      }

      function renderTripCard(trip) {
        const a = document.createElement("a");
        a.className = "trip-card";
        a.href = `trip.html?slug=${encodeURIComponent(trip.slug)}`;

        const dest = trip.destination
          ? `${trip.destination.startLocation || "?"} → ${trip.destination.headlineTo || "?"}`
          : "—";

        a.innerHTML = `
          <div class="title">${escape(trip.title || trip.slug)}</div>
          <div class="destination">${escape(dest)}</div>
          <div class="meta">
            <span class="status-badge status-${escape(trip.status || "draft")}">${escape(trip.status || "draft")}</span>
            <span>${escape(formatDateRange(trip.startDate, (trip.days || []).length))}</span>
            <span>${(trip.days || []).length} days</span>
          </div>
        `;
        return a;
      }

      function escape(s) {
        if (s === null || s === undefined) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      loadTrips();
    </script>
  </body>
</html>
