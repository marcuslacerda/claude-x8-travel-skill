<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trip viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <a href="index.html" style="font-size: 0.85rem; color: var(--ink-muted)">← All trips</a>
      <header class="hero" id="hero">
        <h1 id="title">Loading…</h1>
        <p class="destination" id="destination"></p>
        <div class="meta" id="meta"></div>
      </header>

      <nav class="tabs" id="tabs">
        <button class="tab" data-tab="itinerary">Itinerary</button>
        <button class="tab" data-tab="bookings">Bookings</button>
        <button class="tab" data-tab="budget">Budget</button>
        <button class="tab" data-tab="checklist">Checklist</button>
        <button class="tab" data-tab="map">Map</button>
        <button class="tab" data-tab="gmap" hidden>Google Map</button>
      </nav>

      <main>
        <section class="tab-panel" id="panel-itinerary">
          <div id="itinerary"></div>
        </section>
        <section class="tab-panel" id="panel-bookings">
          <div id="bookings"></div>
        </section>
        <section class="tab-panel" id="panel-budget">
          <div id="budget"></div>
        </section>
        <section class="tab-panel" id="panel-checklist">
          <div id="checklist"></div>
        </section>
        <section class="tab-panel" id="panel-map">
          <div class="map-container" id="map-container"></div>
        </section>
        <section class="tab-panel" id="panel-gmap">
          <div class="map-container" id="gmap-container"></div>
        </section>
      </main>

      <footer style="margin-top: 4rem; color: var(--ink-muted); font-size: 0.85rem">
        Generated by
        <a href="https://github.com/marcuslacerda/claude-x8-travel-skill">claude-x8-travel-skill</a>
        · Map ©
        <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> ·
        <a href="https://maplibre.org/">MapLibre GL</a>
      </footer>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module">
      import { formatDateRange, formatCost, BUDGET_CATEGORY_LABELS } from "./lib/schema-types.js";
      import { renderDayCard } from "./lib/day-card.js";
      import { renderMap } from "./lib/map-renderer.js";
      import { renderGoogleMap } from "./lib/gmap-renderer.js";
      import { loadEnvConfig } from "./lib/env-config.js";
      import { initTabs, bindChecklistPersistence } from "./lib/tabs.js";
      import { buildHydration, hydrateBooking } from "./lib/hydrate.js";

      const params = new URLSearchParams(location.search);
      const slug = params.get("slug");

      if (!slug) {
        document.body.innerHTML =
          '<div class="container"><div class="error">Missing <code>?slug=&lt;slug&gt;</code> in URL.</div></div>';
        throw new Error("missing slug");
      }

      // Look in trips/ first (user trips, gitignored). Fall back to examples/
      // (checked-in showcases) — works out-of-the-box.
      async function fetchFirst(filename) {
        for (const root of [`../trips/${slug}`, `../examples/${slug}`]) {
          try {
            const res = await fetch(`${root}/${filename}`);
            if (res.ok) return res.json();
          } catch {}
        }
        return null;
      }

      Promise.all([fetchFirst("trip.json"), loadEnvConfig()])
        .then(([trip, env]) => {
          if (!trip) throw new Error("trip.json not found");
          // Accept both bare trip docs and the publish wrapper { trip }.
          const doc = trip && typeof trip === "object" && "trip" in trip ? trip.trip : trip;
          render(doc, env);
        })
        .catch((err) => {
          document.querySelector("main").innerHTML =
            `<div class="error">Failed to load trip "${escape(slug)}": ${escape(err.message)}.<br>Make sure you're serving the repo root via <code>python3 -m http.server</code> and that <code>trips/${escape(slug)}/trip.json</code> exists.</div>`;
        });

      function render(trip, env) {
        document.title = `${trip.title} · x8-travel`;

        const dest =
          (trip.destination && `${trip.destination.startLocation} → ${trip.destination.headlineTo}`) ||
          trip.title;

        document.getElementById("title").textContent = trip.title;
        document.getElementById("destination").textContent = dest;
        document.getElementById("meta").innerHTML = `
          <span class="status-badge status-${escape(trip.status)}">${escape(trip.status)}</span>
          <span>${escape(formatDateRange(trip.startDate, (trip.days || []).length))}</span>
          <span>${(trip.days || []).length} days</span>
          <span><strong>${escape(trip.currency)}</strong></span>
          ${trip.timezone ? `<span>tz: ${escape(trip.timezone)}</span>` : ""}
        `;

        // Build the hydration context once — shared across day-card + both renderers.
        const hydration = buildHydration(trip);

        renderItinerary(trip, hydration);
        renderBookings(trip, hydration);
        renderBudget(trip);
        renderChecklist(trip);

        // The Google Map tab is only revealed when the user has both env vars
        // set in `.env.local`.
        const gmapKey = env?.GOOGLE_MAPS_API_KEY;
        const gmapId = env?.GOOGLE_MAP_ID;
        const gmapEnabled = Boolean(gmapKey && gmapId);
        if (gmapEnabled) {
          document.querySelector('[data-tab="gmap"]').hidden = false;
        }

        // initTabs must run before renderMapTab — the lazy map render checks
        // whether the map panel is active before initializing.
        initTabs(document);
        renderMapTab(trip, hydration);
        if (gmapEnabled) {
          renderGoogleMapTab(trip, hydration, { apiKey: gmapKey, mapId: gmapId });
        }
      }

      function renderItinerary(trip, hydration) {
        const root = document.getElementById("itinerary");
        if (!trip.days || trip.days.length === 0) {
          root.innerHTML = '<div class="empty">No days planned yet.</div>';
          return;
        }
        trip.days.forEach((day, dayIndex) => {
          root.appendChild(
            renderDayCard(day, trip, {
              dayIndex,
              startDate: trip.startDate,
              currency: trip.currency,
              hydration,
            }),
          );
        });
      }

      function renderBookings(trip, hydration) {
        const root = document.getElementById("bookings");
        if (!trip.bookings || trip.bookings.length === 0) {
          root.innerHTML = '<div class="empty">No bookings tracked yet.</div>';
          return;
        }
        const sorted = [...trip.bookings].sort((a, b) => a.date.localeCompare(b.date));
        root.innerHTML = `
          <table class="bookings-table">
            <thead>
              <tr><th>Date</th><th>Item</th><th>Status</th><th></th></tr>
            </thead>
            <tbody>
              ${sorted
                .map((b) => {
                  const { place } = hydrateBooking(b, hydration);
                  const linkLabel = b.status === "confirmed" ? "Open" : "Booking";
                  const link = b.link
                    ? `<a href="${escape(b.link)}" target="_blank" rel="noopener">${linkLabel} ↗</a>`
                    : "";
                  const critical = b.critical ? '<span class="critical-badge">CRITICAL</span>' : "";
                  const placeBlock = place
                    ? `${
                        place.picture?.url
                          ? `<img class="booking-thumb" src="${escape(place.picture.url)}" alt="">`
                          : ""
                      }<button class="booking-place-link" data-place-id="${escape(place.id)}">📍 ${escape(place.name)}</button>`
                    : "";
                  return `
                    <tr>
                      <td><code>${escape(b.date)}</code></td>
                      <td>${placeBlock}<br>${escape(b.item)}${critical}</td>
                      <td><span class="booking-status status-${escape(b.status)}">${escape(b.status)}</span></td>
                      <td>${link}</td>
                    </tr>
                  `;
                })
                .join("")}
            </tbody>
          </table>
        `;
        root.querySelectorAll(".booking-place-link").forEach((btn) => {
          btn.addEventListener("click", () => {
            const placeId = btn.getAttribute("data-place-id");
            const dayIdx = (hydration.placeToDays.get(placeId) || [])[0];
            if (dayIdx != null) {
              document.querySelector('[data-tab="itinerary"]')?.click();
              const target = document.getElementById(`day-${dayIdx}`);
              setTimeout(() => target?.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
            }
          });
        });
      }

      function renderBudget(trip) {
        const root = document.getElementById("budget");
        if (!trip.budget || trip.budget.length === 0) {
          root.innerHTML = '<div class="empty">No budget items yet.</div>';
          return;
        }
        const total = trip.budget.reduce((s, b) => s + (b.amount || 0), 0);
        const rows = trip.budget
          .map((b) => {
            const links = (b.links || [])
              .map(
                (l) =>
                  ` · <a href="${escape(l.url)}" target="_blank" rel="noopener">${escape(l.type)}</a>`,
              )
              .join("");
            return `
              <tr>
                <td>${escape(BUDGET_CATEGORY_LABELS[b.category] || b.category)}${links}</td>
                <td class="amount">${escape(formatCost(b.amount, trip.currency))}</td>
                <td>${b.pct.toFixed(0)}%<div class="budget-bar"><div class="budget-bar-fill" style="width:${b.pct}%"></div></div></td>
                <td>${escape(b.status)}</td>
                <td>${escape(b.notes || "")}</td>
              </tr>
            `;
          })
          .join("");

        root.innerHTML = `
          <table class="budget-table">
            <thead>
              <tr><th>Category</th><th>Amount</th><th>%</th><th>Status</th><th>Notes</th></tr>
            </thead>
            <tbody>${rows}
              <tr style="font-weight:600;border-top:2px solid var(--ink)">
                <td>Total</td>
                <td class="amount">${escape(formatCost(total, trip.currency))}</td>
                <td colspan="3"></td>
              </tr>
            </tbody>
          </table>
        `;
      }

      function renderChecklist(trip) {
        const root = document.getElementById("checklist");
        const checklist = (trip.checklist || []).filter((g) => g.type === "checklist");
        const packing = (trip.checklist || []).filter((g) => g.type === "packing");

        if (checklist.length === 0 && packing.length === 0) {
          root.innerHTML = '<div class="empty">Nothing here yet.</div>';
          return;
        }

        const sections = [];
        if (checklist.length > 0) {
          sections.push(`
            <h2 class="section-title">Prep checklist</h2>
            ${renderGroups(checklist)}
          `);
        }
        if (packing.length > 0) {
          sections.push(`
            <h2 class="section-title">Packing list</h2>
            ${renderGroups(packing)}
          `);
        }
        root.innerHTML = sections.join("");
        bindChecklistPersistence(root, trip.slug);
      }

      function renderGroups(groups) {
        return groups
          .map(
            (g) => `
              <div class="checklist-group">
                <h3>${escape(g.title)}</h3>
                ${g.items
                  .map(
                    (item) => `
                    <div class="checklist-item ${item.status === "done" ? "done" : ""}">
                      <input type="checkbox" id="cb-${escape(item.id)}" data-id="${escape(item.id)}" ${
                        item.status === "done" ? "checked" : ""
                      } />
                      <label for="cb-${escape(item.id)}">
                        ${item.critical ? "⚠️ " : ""}${escape(item.text)}
                      </label>
                    </div>
                  `,
                  )
                  .join("")}
              </div>
            `,
          )
          .join("");
      }

      function renderMapTab(trip, hydration) {
        const root = document.getElementById("map-container");
        if ((!trip.places || trip.places.length === 0) && (!trip.routes || trip.routes.length === 0)) {
          root.innerHTML = '<div class="empty">No map data for this trip.</div>';
          return;
        }
        // MapLibre's `failed to invert matrix` error fires when the container
        // has zero width or height at init time. Poll until layout settles.
        let rendered = false;
        let attempts = 0;
        const ensureRendered = () => {
          if (rendered) return;
          if (root.clientWidth === 0 || root.clientHeight === 0) {
            if (++attempts > 60) {
              root.innerHTML =
                '<div class="error">Map container never received layout (clientWidth/Height stayed 0).</div>';
              return;
            }
            requestAnimationFrame(ensureRendered);
            return;
          }
          rendered = true;
          try {
            renderMap(root, trip, { hydration });
          } catch (err) {
            root.innerHTML = `<div class="error">Map failed to render: ${escape(err.message)}</div>`;
          }
        };

        const mapTab = document.querySelector('[data-tab="map"]');
        mapTab?.addEventListener("click", () => {
          attempts = 0;
          requestAnimationFrame(ensureRendered);
        });

        if (document.getElementById("panel-map").classList.contains("active")) {
          requestAnimationFrame(ensureRendered);
        }
      }

      function renderGoogleMapTab(trip, hydration, config) {
        const root = document.getElementById("gmap-container");
        if ((!trip.places || trip.places.length === 0) && (!trip.routes || trip.routes.length === 0)) {
          root.innerHTML = '<div class="empty">No map data for this trip.</div>';
          return;
        }
        let rendered = false;
        let attempts = 0;
        const ensureRendered = () => {
          if (rendered) return;
          if (root.clientWidth === 0 || root.clientHeight === 0) {
            if (++attempts > 60) {
              root.innerHTML =
                '<div class="error">Google Map container never received layout.</div>';
              return;
            }
            requestAnimationFrame(ensureRendered);
            return;
          }
          rendered = true;
          renderGoogleMap(root, trip, { ...config, hydration }).catch((err) => {
            root.innerHTML = `<div class="error">Google Map failed: ${escape(err.message)}.<br>Check that GOOGLE_MAPS_API_KEY is valid and the referrer (localhost) is allowed.</div>`;
          });
        };

        const gmapTab = document.querySelector('[data-tab="gmap"]');
        gmapTab?.addEventListener("click", () => {
          attempts = 0;
          requestAnimationFrame(ensureRendered);
        });

        if (document.getElementById("panel-gmap").classList.contains("active")) {
          requestAnimationFrame(ensureRendered);
        }
      }

      function escape(s) {
        if (s === null || s === undefined) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
